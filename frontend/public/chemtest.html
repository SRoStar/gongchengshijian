<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChemDoodle 3D 分子可视化测试 - MOL 格式</title>

  <!-- ChemDoodle CSS -->
  <link rel="stylesheet" href="./ChemDoodleWeb/install/ChemDoodleWeb.css" type="text/css">

  <!-- ChemDoodle JS -->
  <script type="text/javascript" src="./ChemDoodleWeb/install/ChemDoodleWeb.js"></script>
  <script type="text/javascript" src="./ChemDoodleWeb/install/ChemDoodleWeb-uis.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #1a4a80;
      margin-bottom: 30px;
    }

    .input-section {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #333;
    }

    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
      min-height: 200px;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: #1a4a80;
    }

    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #1a4a80;
      color: white;
    }

    .btn-primary:hover {
      background: #0f3560;
    }

    .btn-secondary {
      background: #e8ecf1;
      color: #333;
    }

    .btn-secondary:hover {
      background: #d0d8e0;
    }

    .presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .preset-btn {
      padding: 6px 12px;
      background: #f0f2f5;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .preset-btn:hover {
      background: #e0e4e8;
      border-color: #1a4a80;
    }

    .viewer-section {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    #canvas-container {
      width: 100%;
      height: 450px;
      border: 1px solid #e0e4e8;
      border-radius: 4px;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewer-info {
      margin-top: 15px;
      padding: 12px;
      background: #f0f4f8;
      border-radius: 4px;
      font-size: 13px;
      color: #666;
    }

    .error-message {
      color: #f56c6c;
      padding: 20px;
      text-align: center;
    }

    .representation-select {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      align-items: center;
    }

    .radio-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 ChemDoodle 3D 分子可视化测试 (MOL 格式)</h1>

    <div class="input-section">
      <div class="input-group">
        <label for="molfile-input">MOL/SDF 格式数据</label>
        <textarea id="molfile-input" placeholder="粘贴 MOL 文件内容..."></textarea>
        <div class="hint">支持标准 MOL/SDF 格式。必须包含 3D 坐标（格式中的 x, y, z 列）才能正确显示 3D 结构。</div>
      </div>

      <div class="presets">
        <button class="preset-btn" onclick="loadDDT()">加载 DDT 示例</button>
        <button class="preset-btn" onclick="loadAspirin()">加载阿司匹林示例</button>
        <button class="preset-btn" onclick="loadEthanol()">加载乙醇示例</button>
        <button class="preset-btn" onclick="loadCaffeine()">加载咖啡因示例</button>
      </div>

      <div class="representation-select">
        <label>显示样式:</label>
        <div class="radio-group">
          <input type="radio" name="rep" id="rep-ball-stick" value="Ball and Stick" checked>
          <label for="rep-ball-stick">球棍模型</label>
        </div>
        <div class="radio-group">
          <input type="radio" name="rep" id="rep-space" value="Space Fill">
          <label for="rep-space">空间填充</label>
        </div>
        <div class="radio-group">
          <input type="radio" name="rep" id="rep-wire" value="Wireframe">
          <label for="rep-wire">线框模型</label>
        </div>
      </div>

      <div class="button-group">
        <button class="btn-primary" onclick="renderMolecule()">🎨 渲染 3D 分子</button>
        <button class="btn-secondary" onclick="clearViewer()">清除</button>
      </div>
    </div>

    <div class="viewer-section">
      <div id="canvas-container">
        <div style="color: #999;">点击"渲染 3D 分子"按钮查看结果</div>
      </div>
      <div class="viewer-info">
        <strong>操作说明:</strong> 左键拖动旋转 | 右键拖动平移 | 滚轮缩放<br>
        <span id="molecule-info"></span>
      </div>
    </div>
  </div>

    // 获取选中的表示方式
    function getRepresentation() {
      const radios = document.getElementsByName('rep');
      for (let radio of radios) {
        if (radio.checked) return radio.value;
      }
      return 'Ball and Stick';
    }

    // 渲染分子
    async function renderMolecule() {
      const container = document.getElementById('canvas-container');
      const infoSpan = document.getElementById('molecule-info');

      // 清除之前的视图
      container.innerHTML = '';

      try {
        // 检查 ChemDoodle 是否加载
        if (typeof ChemDoodle === 'undefined') {
          container.innerHTML = '<div class="error-message">ChemDoodle 库未加载，请检查文件路径</div>';
          return;
        }

        // 获取 MOL 文件内容
        const molfile = document.getElementById('molfile-input').value.trim();
        if (!molfile) {
          container.innerHTML = '<div class="error-message">请输入 MOL 文件内容</div>';
          return;
        }

        // 先设置 canvas 容器的 HTML
        const canvasId = 'chemDoodleCanvas';
        container.innerHTML = `<canvas id="${canvasId}" width="${container.clientWidth - 20}" height="430"
          style="display: block;"></canvas>`;

        // 等待 DOM 更新
        await new Promise(resolve => setTimeout(resolve, 0));

        // 获取容器尺寸
        const width = container.clientWidth - 20;
        const height = 430;

        // 创建 3D 画布 - 使用 ID 字符串
        let transform3D;
        try {
          transform3D = new ChemDoodle.TransformCanvas3D(canvasId, width, height);
        } catch (e) {
          console.warn('TransformCanvas3D 创建失败，尝试使用 ViewerCanvas3D:', e);
          try {
            transform3D = new ChemDoodle.ViewerCanvas3D(canvasId, width, height);
          } catch (e2) {
            console.warn('ViewerCanvas3D 也失败，尝试使用 2D ViewerCanvas:', e2);
            try {
              transform3D = new ChemDoodle.ViewerCanvas(canvasId, width, height);
            } catch (e3) {
              container.innerHTML = '<div class="error-message">无法创建 ChemDoodle 画布。<br>错误: ' + e3.message + '</div>';
              return;
            }
          }
        }

        // 设置样式
        if (transform3D.styles) {
          transform3D.styles.set3DRepresentation && transform3D.styles.set3DRepresentation(getRepresentation());
          transform3D.styles.backgroundColor = '#f8f9fa';
        }

        // 从 MOL 文件加载分子
        const molecule = ChemDoodle.readMOL(molfile, 1);
        const info = `MOL 格式 | 原子数: ${molecule.atoms.length} | 键数: ${molecule.bonds.length}`;

        // 加载分子到画布
        transform3D.loadMolecule(molecule);
        currentViewer = transform3D;
        infoSpan.textContent = info;

      } catch (e) {
        console.error(e);
        container.innerHTML = '<div class="error-message">渲染失败: ' + e.message + '</div>';
        infoSpan.textContent = '';
      }
    }

    // 清除视图
    function clearViewer() {
      const container = document.getElementById('canvas-container');
      container.innerHTML = '<div style="color: #999;">点击"渲染 3D 分子"按钮查看结果</div>';
      document.getElementById('molecule-info').textContent = '';
      currentViewer = null;
    }

    // 页面加载时检查 ChemDoodle 功能
    window.onload = function() {
      checkChemDoodleFeatures();
    };

    // 检查 ChemDoodle 可用功能
    function checkChemDoodleFeatures() {
      if (typeof ChemDoodle === 'undefined') {
        alert('ChemDoodle 库未加载，请检查文件路径是否正确');
        return;
      }

      const features = [];
      if (ChemDoodle.readMOL) features.push('MOL 文件');
      if (ChemDoodle.TransformCanvas3D) features.push('TransformCanvas3D');
      if (ChemDoodle.ViewerCanvas3D) features.push('ViewerCanvas3D');

      console.log('ChemDoodle 可用功能:', features.join(', '));

      // 如果不支持 MOL，显示提示
      if (!ChemDoodle.readMOL) {
        alert('当前 ChemDoodle 版本不支持 MOL 文件格式');
      }
    }
  </script>
</body>
</html>
